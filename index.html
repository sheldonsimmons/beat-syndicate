<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beat Syndicate - Premium Beats</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin:0; font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif; -webkit-font-smoothing:antialiased; background:#080808; color:#fff; }
        .font-display { font-family:'Space Grotesk',sans-serif; }

        /* Glow */
        .glow-yellow { box-shadow:0 0 20px rgba(250,204,21,.4),0 0 40px rgba(250,204,21,.15); }
        .glow-yellow-sm { box-shadow:0 0 10px rgba(250,204,21,.35); }
        .glow-text { text-shadow:0 0 30px rgba(250,204,21,.5); }
        .card-glow:hover { box-shadow:0 0 25px rgba(250,204,21,.2),0 8px 32px rgba(0,0,0,.6); }
        .btn-glow:hover { box-shadow:0 0 20px rgba(250,204,21,.5); }

        /* Backgrounds */
        .hero-bg {
            background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(250,204,21,.12) 0%,transparent 70%),
                       radial-gradient(ellipse 40% 40% at 80% 30%,rgba(255,0,80,.06) 0%,transparent 60%),
                       #080808;
        }
        .header-glass {
            background:rgba(8,8,8,.88);
            backdrop-filter:blur(16px);
            -webkit-backdrop-filter:blur(16px);
            border-bottom:1px solid rgba(250,204,21,.1);
        }
        .hero-grid {
            background-image:linear-gradient(rgba(250,204,21,.04) 1px,transparent 1px),
                             linear-gradient(90deg,rgba(250,204,21,.04) 1px,transparent 1px);
            background-size:48px 48px;
        }
        .tiktok-bg {
            background:linear-gradient(135deg,rgba(0,0,0,.9) 0%,rgba(18,18,18,1) 100%);
            border:1px solid rgba(255,255,255,.07);
        }

        /* Text gradients */
        .gradient-text { background:linear-gradient(135deg,#facc15 0%,#fde68a 50%,#f59e0b 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .gradient-text-red { background:linear-gradient(135deg,#ff0050 0%,#ee1d52 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

        /* Cards */
        .beat-card { background:linear-gradient(145deg,#141414,#0f0f0f); border:1px solid rgba(255,255,255,.06); transition:all .3s ease; }
        .beat-card:hover { border-color:rgba(250,204,21,.4); transform:translateY(-4px); }

        /* Waveform */
        .waveform { display:flex; align-items:center; gap:2px; height:32px; }
        .waveform-bar { width:3px; background:#facc15; border-radius:2px; animation:wave 1.2s ease-in-out infinite; }
        .waveform-bar:nth-child(1){animation-delay:0s;height:40%}
        .waveform-bar:nth-child(2){animation-delay:.1s;height:70%}
        .waveform-bar:nth-child(3){animation-delay:.2s;height:100%}
        .waveform-bar:nth-child(4){animation-delay:.3s;height:65%}
        .waveform-bar:nth-child(5){animation-delay:.4s;height:80%}
        .waveform-bar:nth-child(6){animation-delay:.5s;height:45%}
        .waveform-bar:nth-child(7){animation-delay:.6s;height:90%}
        .waveform-bar:nth-child(8){animation-delay:.7s;height:55%}
        .waveform-bar:nth-child(9){animation-delay:.8s;height:75%}
        .waveform-bar:nth-child(10){animation-delay:.9s;height:50%}
        .waveform-bar:nth-child(11){animation-delay:1.0s;height:85%}
        .waveform-bar:nth-child(12){animation-delay:1.1s;height:40%}
        @keyframes wave { 0%,100%{transform:scaleY(.4)} 50%{transform:scaleY(1)} }
        .waveform-static .waveform-bar { animation:none; }
        .waveform-static .waveform-bar:nth-child(odd){height:30%}
        .waveform-static .waveform-bar:nth-child(even){height:60%}

        /* Cart drawer */
        .cart-drawer { transform:translateX(100%); transition:transform .35s cubic-bezier(.4,0,.2,1); }
        .cart-drawer.open { transform:translateX(0); }

        /* Badges */
        .badge-new { animation:badgePulse 2s ease-in-out infinite; }
        @keyframes badgePulse { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)} 50%{box-shadow:0 0 0 6px rgba(34,197,94,0)} }

        /* Progress */
        .progress-bar { background:linear-gradient(90deg,#facc15,#f59e0b); animation:progressPulse 1.5s ease-in-out infinite; }
        @keyframes progressPulse { 0%,100%{opacity:1} 50%{opacity:.7} }

        /* Mobile menu */
        .mobile-menu { max-height:0; overflow:hidden; transition:max-height .3s ease; }
        .mobile-menu.open { max-height:300px; }

        /* Misc */
        .section-divider { background:linear-gradient(90deg,transparent,rgba(250,204,21,.3),transparent); height:1px; }
        .license-card { transition:all .3s ease; }
        .license-card:hover { transform:translateY(-6px); }
        .overlay-enter { animation:fadeIn .2s ease; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:#111} ::-webkit-scrollbar-thumb{background:#333;border-radius:3px} ::-webkit-scrollbar-thumb:hover{background:#facc15}

        /* Email modal */
        .email-modal { animation:slideUp .25s ease; }
        @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

        /* TikTok brand color */
        .tiktok-btn { background:linear-gradient(135deg,#010101,#1a1a1a); border:1px solid rgba(255,255,255,.12); }
        .tiktok-btn:hover { border-color:rgba(238,29,82,.5); box-shadow:0 0 20px rgba(238,29,82,.2); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ── Supabase ──────────────────────────────────────────────
        const SUPABASE_URL = 'https://iggfzngtwaujmuctubrb.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnZ2Z6bmd0d2F1am11Y3R1YnJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDUwODQsImV4cCI6MjA4NjY4MTA4NH0.zHPND9_MraDwlGJQpla2TvwRlKTDjilU8DIM0ao1mJc';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ── Stripe ────────────────────────────────────────────────
        const STRIPE_PUBLISHABLE_KEY = 'pk_live_51KTx2OGUY0Zua5gvrn3Gkfq4ZuGIL9UJF774yssnwwqMnKytVEpUAzniiVVcEt73zPzI4lwHMPH1mhdY7gEWZoCF00RAKtR2OX';

        // ── Icons ─────────────────────────────────────────────────
        const ShoppingCart = ({ size=24, className='' }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">

        const Check = ({ size=20 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        const Upload = ({ size=24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
        );
        const X = ({ size=24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const Edit2 = ({ size=24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>;
        const Trash2 = ({ size=24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                <line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>
            </svg>
        );
        const Plus = ({ size=24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const Music = ({ size=24, className='' }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
            </svg>
        );
        const Menu = ({ size=24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>;
        const TikTokIcon = ({ size=24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor">
                <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.16 8.16 0 0 0 4.77 1.52V6.75a4.85 4.85 0 0 1-1-.06z"/>
            </svg>
        );

        // ── Waveform ──────────────────────────────────────────────
        const Waveform = ({ playing }) => (
            <div className={`waveform ${playing ? '' : 'waveform-static'}`}>
                {Array.from({length:12}).map((_,i) => <div key={i} className="waveform-bar" />)}
            </div>
        );

        // ── Beat Badge ────────────────────────────────────────────
        const BeatBadge = ({ type }) => {
            if (type === 'new') return <span className="badge-new inline-flex items-center bg-green-500 text-white text-xs px-2 py-0.5 rounded-full font-black uppercase tracking-wide">New</span>;
            if (type === 'trending') return <span className="inline-flex items-center bg-orange-500 text-white text-xs px-2 py-0.5 rounded-full font-black uppercase tracking-wide">Hot</span>;
            if (type === 'exclusive') return <span className="inline-flex items-center bg-yellow-400 text-black text-xs px-2 py-0.5 rounded-full font-black uppercase tracking-wide">Exclusive</span>;
            return null;
        };

        // ── Beat Card ─────────────────────────────────────────────
        function BeatCard({ beat, idx, badge, playing, progress, onPlay, onSeek, onAddToCart, isAdmin, onEdit, onDelete }) {
            const [selectedLicense, setSelectedLicense] = useState('Basic');
            const multipliers = { Basic:1, Premium:2, Exclusive:100 };
            const displayPrice = beat.price * (multipliers[selectedLicense] || 1);

            return (
                <div className="beat-card card-glow rounded-2xl overflow-hidden">
                    {/* Visual top */}
                    <div style={{background:'linear-gradient(135deg,#1a1a1a,#0f0f0f)',borderBottom:'1px solid rgba(255,255,255,.05)'}} className="p-5">
                        <div className="flex items-center gap-2 mb-3">
                            {badge && <BeatBadge type={badge} />}
                            <div className="ml-auto flex gap-1">
                                {isAdmin && (
                                    <>
                                        <button onClick={onEdit} className="bg-blue-500/20 border border-blue-500/30 text-blue-400 p-1.5 rounded-lg hover:bg-blue-500/30 transition"><Edit2 size={13}/></button>
                                        <button onClick={onDelete} className="bg-red-500/20 border border-red-500/30 text-red-400 p-1.5 rounded-lg hover:bg-red-500/30 transition"><Trash2 size={13}/></button>
                                    </>
                                )}
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={onPlay}
                                className={`flex-shrink-0 w-11 h-11 rounded-full flex items-center justify-center transition ${playing ? 'bg-yellow-400 text-black glow-yellow' : beat.preview_url ? 'bg-white/10 hover:bg-yellow-400 hover:text-black border border-white/15 text-white' : 'bg-white/5 text-gray-700 border border-white/5 cursor-not-allowed'}`}
                                disabled={!beat.preview_url}>
                                {playing ? <Pause size={18}/> : <Play size={18}/>}
                            </button>
                            <div className="flex-1 relative" onClick={onSeek} style={{cursor:playing?'pointer':'default'}}>
                                <Waveform playing={playing}/>
                                {playing && (
                                    <div className="mt-2 h-1 bg-white/10 rounded-full overflow-hidden">
                                        <div className="h-full bg-yellow-400 rounded-full transition-all duration-300" style={{width:`${progress}%`}}/>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Body */}
                    <div className="p-5">
                        <div className="mb-3">
                            <h3 className="font-black text-lg leading-tight truncate">{beat.title}</h3>
                            <p className="text-gray-500 text-sm">{beat.genre}</p>
                        </div>
                        <div className="flex items-center gap-3 mb-4">
                            <span style={{background:'rgba(255,255,255,.05)',borderRadius:'6px',padding:'3px 10px'}} className="text-xs font-bold text-gray-400">{beat.bpm} BPM</span>
                            <span style={{background:'rgba(255,255,255,.05)',borderRadius:'6px',padding:'3px 10px'}} className="text-xs font-bold text-gray-400">{beat.key}</span>
                        </div>
                        {beat.tags && beat.tags.length > 0 && (
                            <div className="flex flex-wrap gap-1.5 mb-4">
                                {beat.tags.slice(0,4).map(tag => (
                                    <span key={tag} style={{background:'rgba(250,204,21,.07)',border:'1px solid rgba(250,204,21,.15)',borderRadius:'20px'}} className="text-yellow-500 text-xs px-2.5 py-0.5 font-semibold">#{tag}</span>
                                ))}
                                {beat.tags.length > 4 && <span className="text-gray-600 text-xs py-0.5">+{beat.tags.length-4}</span>}
                            </div>
                        )}
                        {!isAdmin && (
                            <div>
                                <div className="flex items-center gap-2 mb-3">
                                    {['Basic','Premium','Exclusive'].map(lic => (
                                        <button key={lic} onClick={() => setSelectedLicense(lic)}
                                            className={`flex-1 text-xs py-1.5 rounded-lg font-bold transition ${selectedLicense===lic ? lic==='Exclusive' ? 'bg-purple-500 text-white' : 'bg-yellow-400 text-black' : 'bg-white/5 text-gray-500 hover:bg-white/10'}`}>
                                            {lic}
                                        </button>
                                    ))}
                                </div>
                                <div className="flex items-center justify-between">
                                    <span className="gradient-text font-black text-2xl">${displayPrice.toLocaleString()}</span>
                                    <button onClick={() => onAddToCart(selectedLicense)}
                                        style={{background:'linear-gradient(135deg,#facc15,#f59e0b)'}}
                                        className="flex items-center gap-2 text-black px-4 py-2.5 rounded-xl font-black text-sm hover:opacity-90 transition btn-glow">

                    </div>
                </div>
            );
        }

        // ── Main App ─────────────────────────────────────────────
        function BeatSyndicate() {
            const [cart, setCart] = useState([]);
            const [playingId, setPlayingId] = useState(null);
            const [audioProgress, setAudioProgress] = useState(0);
            const [selectedFilter, setSelectedFilter] = useState('all');
            const [isAdmin, setIsAdmin] = useState(false);
            const [showUploadModal, setShowUploadModal] = useState(false);
            const [beats, setBeats] = useState([]);
            const [loading, setLoading] = useState(true);
            const [currentPage, setCurrentPage] = useState('home');
            const [showCart, setShowCart] = useState(false);
            const [showMobileMenu, setShowMobileMenu] = useState(false);
            const [checkoutEmail, setCheckoutEmail] = useState('');
            const [showEmailModal, setShowEmailModal] = useState(false);
            const [checkoutLoading, setCheckoutLoading] = useState(false);
            const [checkoutError, setCheckoutError] = useState('');
            const audioRef = useRef(new Audio());

            const [newBeat, setNewBeat] = useState({
                title:'', genre:'Hip Hop', bpm:140, key:'Am', price:35,
                tags:[], exclusive:false, previewFile:null, mp3File:null, wavFile:null, stemsFile:null
            });
            const [tagInput, setTagInput] = useState('');
            const [editingBeat, setEditingBeat] = useState(null);
            const [uploadProgress, setUploadProgress] = useState({});
            const [isDragging, setIsDragging] = useState(false);
            const [uploadedFiles, setUploadedFiles] = useState([]);

            const licenses = [
                { name:"Basic", price:"base", color:"from-gray-800 to-gray-900", border:"border-gray-700",
                  features:["MP3 Format","Non-Profit Use","Up to 5,000 Streams","Producer Tag Included"] },
                { name:"Premium", price:"x2", color:"from-yellow-900/40 to-gray-900", border:"border-yellow-400",
                  features:["WAV + MP3","Unlimited Streams","Music Videos Allowed","Trackouts Available","Producer Tag Removed"] },
                { name:"Exclusive", price:"x100", color:"from-purple-900/40 to-gray-900", border:"border-purple-500",
                  features:["Full Rights Transfer","WAV Stems Included","Producer Credit Only","Beat Removed from Store","Contract Included"] }
            ];
            const keyOptions = ['Am','A#m','Bm','Cm','C#m','Dm','D#m','Em','Fm','F#m','Gm','G#m','Amaj','A#maj','Bmaj','Cmaj','C#maj','Dmaj','D#maj','Emaj','Fmaj','F#maj','Gmaj','G#maj'];

            useEffect(() => { fetchBeats(); }, []);

            const fetchBeats = async () => {
                try {
                    setLoading(true);
                    const { data, error } = await supabase.from('beats').select('*').order('created_at',{ascending:false});
                    if (error) throw error;
                    setBeats(data || []);
                } catch(e) { console.error(e); }
                finally { setLoading(false); }
            };

            // Audio tracking
            useEffect(() => {
                const audio = audioRef.current;
                const onEnded = () => { setPlayingId(null); setAudioProgress(0); };
                const onTime = () => { if (audio.duration) setAudioProgress((audio.currentTime/audio.duration)*100); };
                audio.addEventListener('ended', onEnded);
                audio.addEventListener('timeupdate', onTime);
                return () => { audio.removeEventListener('ended',onEnded); audio.removeEventListener('timeupdate',onTime); };
            }, []);

            // File helpers
            const uploadFile = async (file, bucket, path) => {
                const { error } = await supabase.storage.from(bucket).upload(path, file, {cacheControl:'3600',upsert:false});
                if (error) throw error;
                const { data:{publicUrl} } = supabase.storage.from(bucket).getPublicUrl(path);
                return publicUrl;
            };

            const handleFilesSelect = (files) => {
                const arr = Array.from(files);
                const newFiles = [];
                arr.forEach(file => {
                    const ext = file.name.split('.').pop().toLowerCase();
                    const info = {file, name:file.name, size:(file.size/1024/1024).toFixed(2)+' MB', type:ext};
                    if (!newBeat.previewFile && ['mp3','wav','m4a','aac'].includes(ext)) {
                        setNewBeat(p => ({...p,previewFile:file})); info.assignedTo='Preview (playable)';
                    } else if (ext==='mp3') { setNewBeat(p=>({...p,mp3File:file})); info.assignedTo='Full MP3'; }
                    else if (ext==='wav') { setNewBeat(p=>({...p,wavFile:file})); info.assignedTo='WAV (Premium)'; }
                    else if (ext==='zip') { setNewBeat(p=>({...p,stemsFile:file})); info.assignedTo='Stems'; }
                    newFiles.push(info);
                });
                setUploadedFiles(p => [...p,...newFiles]);
            };
            const handleDrop = (e) => { e.preventDefault(); setIsDragging(false); handleFilesSelect(e.dataTransfer.files); };
            const handleDragOver = (e) => { e.preventDefault(); setIsDragging(true); };
            const handleDragLeave = (e) => { e.preventDefault(); setIsDragging(false); };
            const removeUploadedFile = (i) => {
                const file = uploadedFiles[i];
                setUploadedFiles(uploadedFiles.filter((_,j)=>j!==i));
                if (file.assignedTo==='Preview (playable)') setNewBeat(p=>({...p,previewFile:null}));
                if (file.assignedTo==='Full MP3') setNewBeat(p=>({...p,mp3File:null}));
                if (file.assignedTo==='WAV (Premium)') setNewBeat(p=>({...p,wavFile:null}));
                if (file.assignedTo==='Stems') setNewBeat(p=>({...p,stemsFile:null}));
            };
            const addTag = () => {
                if (tagInput.trim() && !newBeat.tags.includes(tagInput.trim())) {
                    setNewBeat({...newBeat,tags:[...newBeat.tags,tagInput.trim()]}); setTagInput('');
                }
            };
            const removeTag = (t) => setNewBeat({...newBeat,tags:newBeat.tags.filter(x=>x!==t)});

            const saveBeat = async () => {
                if (!newBeat.title) { alert('Please provide a beat title'); return; }
                if (!editingBeat && !newBeat.previewFile) { alert('Please upload at least one audio file'); return; }
                try {
                    const ts = Date.now();
                    let previewUrl=editingBeat?.preview_url||null, mp3Url=editingBeat?.mp3_url||null,
                        wavUrl=editingBeat?.wav_url||null, stemsUrl=editingBeat?.stems_url||null;
                    if (newBeat.previewFile) { setUploadProgress({status:'Uploading preview...',pct:20}); previewUrl=await uploadFile(newBeat.previewFile,'beat-previews',`${ts}-${newBeat.previewFile.name}`); }
                    if (newBeat.mp3File) { setUploadProgress({status:'Uploading MP3...',pct:45}); mp3Url=await uploadFile(newBeat.mp3File,'beat-files',`${ts}-${newBeat.mp3File.name}`); }
                    if (newBeat.wavFile) { setUploadProgress({status:'Uploading WAV...',pct:65}); wavUrl=await uploadFile(newBeat.wavFile,'beat-files',`${ts}-${newBeat.wavFile.name}`); }
                    if (newBeat.stemsFile) { setUploadProgress({status:'Uploading stems...',pct:85}); stemsUrl=await uploadFile(newBeat.stemsFile,'beat-files',`${ts}-${newBeat.stemsFile.name}`); }
                    setUploadProgress({status:'Saving...',pct:95});
                    const beatData = {title:newBeat.title,genre:newBeat.genre,bpm:newBeat.bpm,key:newBeat.key,price:newBeat.price,tags:newBeat.tags,exclusive:newBeat.exclusive,preview_url:previewUrl,mp3_url:mp3Url,wav_url:wavUrl,stems_url:stemsUrl};
                    if (editingBeat) { const {error}=await supabase.from('beats').update(beatData).eq('id',editingBeat.id); if(error) throw error; }
                    else { const {error}=await supabase.from('beats').insert([beatData]); if(error) throw error; }
                    setNewBeat({title:'',genre:'Hip Hop',bpm:140,key:'Am',price:35,tags:[],exclusive:false,previewFile:null,mp3File:null,wavFile:null,stemsFile:null});
                    setShowUploadModal(false); setEditingBeat(null); setUploadProgress({}); setUploadedFiles([]);
                    await fetchBeats();
                } catch(e) { console.error(e); alert('Error uploading beat: '+e.message); setUploadProgress({}); }
            };

            const deleteBeat = async (id) => {
                if (!confirm('Delete this beat?')) return;
                const {error} = await supabase.from('beats').delete().eq('id',id);
                if (error) alert('Error: '+error.message); else await fetchBeats();
            };

            const startEdit = (beat) => {
                setEditingBeat(beat);
                setNewBeat({title:beat.title,genre:beat.genre,bpm:beat.bpm,key:beat.key,price:beat.price,tags:beat.tags||[],exclusive:beat.exclusive,previewFile:null,mp3File:null,wavFile:null,stemsFile:null});
                setShowUploadModal(true);
            };

            const addToCart = (beat, license='Basic') => {
                setCart(prev => [...prev, {...beat, license, cartId:`${beat.id}-${license}-${Date.now()}`}]);
                setShowCart(true);
            };
            const removeFromCart = (cartId) => setCart(cart.filter(i=>i.cartId!==cartId));

            const cartTotal = cart.reduce((sum,item) => {
                const m = item.license==='Premium'?2:item.license==='Exclusive'?100:1;
                return sum+(item.price*m);
            },0);

            // Stripe checkout - opens email modal then redirects
            const openCheckout = () => {
                if (cart.length===0) return;
                setCheckoutEmail(''); setCheckoutError(''); setShowEmailModal(true);
            };

            const handleCheckout = async (e) => {
                e.preventDefault();
                if (!checkoutEmail || !checkoutEmail.includes('@')) { setCheckoutError('Please enter a valid email address.'); return; }
                setCheckoutLoading(true); setCheckoutError('');
                try {
                    const response = await fetch('/.netlify/functions/create-checkout', {
                        method:'POST',
                        headers:{'Content-Type':'application/json'},
                        body:JSON.stringify({items:cart, customerEmail:checkoutEmail})
                    });
                    const {sessionId, error} = await response.json();
                    if (error) { setCheckoutError(error); setCheckoutLoading(false); return; }
                    const result = await stripe.redirectToCheckout({sessionId});
                    if (result.error) { setCheckoutError(result.error.message); setCheckoutLoading(false); }
                } catch(e) { setCheckoutError('Error connecting to checkout. Please try again.'); setCheckoutLoading(false); }
            };

            const togglePlay = async (beat) => {
                if (playingId===beat.id) { audioRef.current.pause(); setPlayingId(null); setAudioProgress(0); }
                else if (beat.preview_url) {
                    audioRef.current.src=beat.preview_url;
                    try { await audioRef.current.play(); setPlayingId(beat.id); }
                    catch(e) { alert('Error playing preview.'); }
                }
            };

            const seekAudio = (e, beat) => {
                if (playingId!==beat.id) return;
                const rect = e.currentTarget.getBoundingClientRect();
                audioRef.current.currentTime = ((e.clientX-rect.left)/rect.width)*audioRef.current.duration;
            };

            const filteredBeats = selectedFilter==='all' ? beats : beats.filter(b=>b.genre===selectedFilter);
            const getBadge = (beat,idx) => beat.exclusive?'exclusive':idx===0?'new':idx===1||idx===3?'trending':null;
            const navTo = (page) => { setCurrentPage(page); setShowMobileMenu(false); window.scrollTo({top:0,behavior:'smooth'}); };
            const openUpload = () => { setEditingBeat(null); setNewBeat({title:'',genre:'Hip Hop',bpm:140,key:'Am',price:35,tags:[],exclusive:false,previewFile:null,mp3File:null,wavFile:null,stemsFile:null}); setShowUploadModal(true); };
            const closeUpload = () => { setShowUploadModal(false); setEditingBeat(null); setUploadProgress({}); setUploadedFiles([]); };

                                            <select value={newBeat.key} onChange={e=>setNewBeat({...newBeat,key:e.target.value})}
                                                className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-yellow-400/50 transition">
                                                {keyOptions.map(k=><option key={k} value={k}>{k}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-400 mb-2">Price ($)</label>
                                            <input type="number" value={newBeat.price} onChange={e=>setNewBeat({...newBeat,price:parseFloat(e.target.value)||0})}
                                                className="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-yellow-400/50 transition" min="20" max="5000" step="5"/>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-bold text-gray-400 mb-2">Tags</label>
                                        <div className="flex gap-2 mb-3">
                                            <input type="text" value={tagInput} onChange={e=>setTagInput(e.target.value)} onKeyPress={e=>e.key==='Enter'&&(e.preventDefault(),addTag())}
                                                className="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-yellow-400/50 transition placeholder-gray-700" placeholder="Add a tag..."/>
                                            <button onClick={addTag} type="button" className="bg-yellow-400 text-black px-4 py-2.5 rounded-xl font-bold text-sm hover:bg-yellow-300 transition">Add</button>
                                        </div>
                                        <div className="flex flex-wrap gap-2">
                                            {newBeat.tags.map(tag => (
                                                <span key={tag} style={{background:'rgba(250,204,21,.1)',border:'1px solid rgba(250,204,21,.2)',borderRadius:'20px'}} className="text-yellow-300 text-xs px-3 py-1.5 flex items-center gap-1.5 font-semibold">
                                                    #{tag}<button onClick={()=>removeTag(tag)} className="text-yellow-600 hover:text-yellow-400 transition"><X size={12}/></button>
                                                </span>
                                            ))}
                                        </div>
                                    </div>

                                    <label className="flex items-center gap-3 cursor-pointer">
                                        <input type="checkbox" checked={newBeat.exclusive} onChange={e=>setNewBeat({...newBeat,exclusive:e.target.checked})} className="w-5 h-5 accent-yellow-400"/>
                                        <div><span className="font-bold">Mark as Exclusive</span><span className="text-gray-600 text-xs block">Displays exclusive badge and pricing</span></div>
                                    </label>

                                    <div>
                                        <label className="block text-sm font-bold text-gray-400 mb-3">Upload Files</label>
                                        {!editingBeat && (
                                            <div style={{background:'rgba(59,130,246,.08)',border:'1px solid rgba(59,130,246,.2)',borderRadius:'10px'}} className="p-3 mb-3 text-sm text-blue-300">
                                                <span className="font-bold">Required:</span> Title + any audio file (MP3/WAV)
                                                <span className="text-blue-500 block text-xs mt-0.5">First audio = playable preview.</span>
                                            </div>
                                        )}
                                        <div onDrop={handleDrop} onDragOver={handleDragOver} onDragLeave={handleDragLeave}
                                            style={{border:`2px dashed ${isDragging?'#facc15':'rgba(255,255,255,.1)'}`,background:isDragging?'rgba(250,204,21,.05)':'rgba(255,255,255,.02)',borderRadius:'14px',transition:'all .2s'}}
                                            className="p-8 text-center cursor-pointer hover:border-yellow-400/30 transition"
                                            onClick={() => document.getElementById('fileInput').click()}>
                                            <div style={{width:52,height:52,background:'rgba(250,204,21,.08)',borderRadius:'12px',margin:'0 auto 12px'}} className="flex items-center justify-center">
                                                <Upload size={24} className="text-yellow-400"/>
                                            </div>
                                            <p className="text-white font-semibold mb-1">Drop files here or <span className="text-yellow-400">click to browse</span></p>
                                            <p className="text-gray-600 text-xs">MP3, WAV, ZIP stems — multiple files supported</p>
                                            <input id="fileInput" type="file" multiple accept=".mp3,.wav,.m4a,.aac,.zip" className="hidden" onChange={e=>handleFilesSelect(e.target.files)}/>
                                        </div>
                                        {uploadedFiles.length>0 && (
                                            <div className="mt-3 space-y-2">
                                                {uploadedFiles.map((file,i) => (
                                                    <div key={i} style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.07)',borderRadius:'10px'}} className="flex items-center gap-3 p-3">
                                                        <div style={{width:36,height:36,background:'rgba(250,204,21,.1)',borderRadius:'8px'}} className="flex items-center justify-center flex-shrink-0 text-lg">
                                                            {file.type==='zip'?'📦':'🎵'}
                                                        </div>
                                                        <div className="flex-1 min-w-0">
                                                            <p className="text-sm font-semibold truncate">{file.name}</p>
                                                            <div className="flex items-center gap-2 mt-0.5">
                                                                <span className="text-gray-600 text-xs">{file.size}</span>
                                                                {file.assignedTo && <span style={{background:'rgba(34,197,94,.1)',color:'#4ade80',borderRadius:'4px',padding:'1px 6px',fontSize:'10px',fontWeight:'700'}}>{file.assignedTo}</span>}
                                                            </div>
                                                        </div>
                                                        <button onClick={()=>removeUploadedFile(i)} className="text-gray-600 hover:text-red-400 transition p-1"><X size={16}/></button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div className="p-6 border-t border-white/5 flex gap-3">
                                    <button onClick={closeUpload} className="flex-1 bg-white/5 border border-white/10 py-3 rounded-xl font-bold text-gray-400 hover:bg-white/10 transition">Cancel</button>
                                    <button onClick={saveBeat} disabled={!!uploadProgress.status}
                                        className={`flex-1 py-3 rounded-xl font-black text-lg transition ${uploadProgress.status?'bg-yellow-400/40 text-black/40 cursor-not-allowed':'bg-yellow-400 text-black hover:bg-yellow-300 btn-glow'}`}>
                                        {uploadProgress.status?'Uploading...':editingBeat?'Save Changes':'Upload Beat'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ══ FOOTER ═══════════════════════════════════════ */}
